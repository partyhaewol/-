<!DOCTYPE html>

}

}
.box {
    border: 1px solid #ddd;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
}
img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>
<body>

<h1>파티해월 출장 상차림</h1>

    <p>1800 사이즈: 45만원</p>
    <p>2400 사이즈: 55만원</p>
</div>

<div class="box">
    <img src="1.jpg">
</div>

<div class="box">
    <h2>프리미엄 상차림</h2>
    <p>수아 적색 일월오봉 2400: 68만원</p>

</div>

<div class="box">
    <img src="4.jpg">
</div>

<div class="box">
    <img src="5.JPG">
</div>

    <h2>안내</h2>
    <p>부산 전지역 출장 가능</p>

</div>

</body>
</html>
